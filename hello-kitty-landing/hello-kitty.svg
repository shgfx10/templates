<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Hello Kitty face -->
  <ellipse cx="100" cy="110" rx="70" ry="65" fill="white" stroke="#333" stroke-width="2"/>
  <!-- Ears -->
  <ellipse cx="55" cy="55" rx="25" ry="35" fill="white" stroke="#333" stroke-width="2"/>
  <ellipse cx="145" cy="55" rx="25" ry="35" fill="white" stroke="#333" stroke-width="2"/>
  <ellipse cx="55" cy="55" rx="18" ry="28" fill="#ffb6c1"/>
  <ellipse cx="145" cy="55" rx="18" ry="28" fill="#ffb6c1"/>
  <!-- Bow -->
  <circle cx="155" cy="60" r="12" fill="#ff69b4"/>
  <ellipse cx="170" cy="55" rx="15" ry="10" fill="#ff69b4"/>
  <ellipse cx="140" cy="55" rx="15" ry="10" fill="#ff69b4"/>
  <circle cx="155" cy="55" r="5" fill="#ff1493"/>
  <!-- Eyes -->
  <ellipse cx="80" cy="100" rx="6" ry="8" fill="#333"/>
  <ellipse cx="120" cy="100" rx="6" ry="8" fill="#333"/>
  <!-- Nose -->
  <ellipse cx="100" cy="115" rx="5" ry="4" fill="#ffb347"/>
  <!-- Whiskers -->
  <line x1="40" y1="105" x2="70" y2="110" stroke="#333" stroke-width="2"/>
  <line x1="40" y1="120" x2="70" y2="118" stroke="#333" stroke-width="2"/>
  <line x1="130" y1="110" x2="160" y2="105" stroke="#333" stroke-width="2"/>
  <line x1="130" y1="118" x2="160" y2="120" stroke="#333" stroke-width="2"/>
</svg>
